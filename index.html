<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
}

.hidden { display: none; }

#startScreen { margin-top: 100px; }

input {
    padding: 10px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #ff4b5c;
    color: white;
    margin-top: 15px;
    cursor: pointer;
}

.card {
    background: white;
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

#photoSlider {
    width: 90%;
    border-radius: 15px;
    margin: 20px;
    transition: opacity 0.5s ease-in-out;
}
</style>
</head>

<body>

<div id="startScreen">
    <h2>Enter Your Name 🎁</h2>
    <input type="text" id="nameInput" placeholder="Your Name">
    <br>
    <button onclick="start()">Start</button>
</div>

<div id="noteSection" class="hidden">
    <div class="card">
        <h2 id="wish"></h2>
        <p>
Happy Birthday, Bhai ❤️🎉 <br><br>
You’re my biggest support system and my forever protector.<br><br>
I’m so proud of everything you’ve achieved ✨<br><br>
May your life be full of success, happiness, and love 💙
        </p>
        <button onclick="showMemories()">Check the Memory 📸</button>
    </div>
</div>

<div id="memorySection" class="hidden">
    <h2>Memories 📸</h2>
    <img id="photoSlider" src="">

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
    </audio>
</div>

<script>
// 🔥 PUT YOUR REAL IMAGE LINKS HERE
let photos = [
"https://apurvakadam19.github.io/birthday-site-adi-to-sonu/photo1.jpg",
"https://apurvakadam19.github.io/birthday-site-adi-to-sonu/photo2.jpg",
"https://apurvakadam19.github.io/birthday-site-adi-to-sonu/photo3.jpg",
"https://apurvakadam19.github.io/birthday-site-adi-to-sonu/photo4.jpg",
"https://apurvakadam19.github.io/birthday-site-adi-to-sonu/photo5.jpg"
];

function start(){
    let name = document.getElementById("nameInput").value;

    if(name === ""){
        alert("Please enter your name 😊");
        return;
    }

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("noteSection").classList.remove("hidden");

    document.getElementById("wish").innerText =
        "Happy Birthday " + name + " 🎉";

    confetti({ particleCount: 150, spread: 70 });
}

function showMemories(){
    document.getElementById("noteSection").style.display = "none";
    document.getElementById("memorySection").classList.remove("hidden");

    startPhotoSlider();
    document.getElementById("bgMusic").play();
}

function startPhotoSlider(){
    let img = document.getElementById("photoSlider");
    let index = 0;

    img.src = photos[index];

    setInterval(function(){
        img.style.opacity = 0;

        setTimeout(function(){
            index = (index + 1) % photos.length;
            img.src = photos[index];
            img.style.opacity = 1;
        }, 400);

    }, 1500);
}
</script>

</body>
</html>
